name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    output:
      script-file: ${{ steps.newid.outputs.script-file }}
    steps:
   
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Git File Name 
        id: newid
        run: find dist/assets/*.js -type f -exec basename 'script-file={}' >> $GITHUB_OUTPUT \;
      - name: upload-artifact
        uses: actions/upload-artifact@v7
        with:
           name: dest-artifact
           path: |
             dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Git artifact
        uses: actions/download-artifact@v8
        with:
          name: dest-artifact
      - name: Deploy
        run: echo "Deploying..."
      - name: check download artifact 
        run: ls -l
      - name: Git outputs
        run: echo ${{ needs.build.outputs.script-file }}

